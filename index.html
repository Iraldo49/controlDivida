<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Dívidas</title>
    <link rel="stylesheet" href="css/styles.css">
  <style>@view-transition { navigation: auto; }</style>
 </head>
 <body>
  <div class="app-container">
   <div class="content-wrapper">
    <header class="header">
     <h1 id="titulo-principal">Controle de Dívidas</h1>
    </header>
    <div class="card form-section">
     <h2>Adicionar Novo Devedor</h2>
     <form id="form-devedor">
      <div class="form-grid">
       <div class="form-group"><label for="input-nome">Nome do Devedor</label> <input type="text" id="input-nome" required placeholder="Ex: Iraldo Muabsa">
       </div>
       <div class="form-group"><label for="input-valor">Valor da Dívida (MT)</label> <input type="number" id="input-valor" step="0.01" min="0" required placeholder="0,00">
       </div>
       <div class="form-group"><label for="input-data">Data (opcional)</label> <input type="date" id="input-data">
       </div>
       <div class="form-group"><label for="input-observacoes">Observações (opcional)</label> <textarea id="input-observacoes" placeholder="Ex: M-Pesa, E-mola, Bebidas, Etc."></textarea>
       </div>
      </div><button type="submit" class="btn btn-primary" id="btn-submit"> <span id="btn-text-adicionar">Adicionar Devedor</span> </button>
     </form>
    </div>
    <div class="total-section">
     <h3 id="label-total">Total de Dívidas Pendentes</h3>
     <p class="amount" id="total-pendente">MT 0,00</p>
    </div>
    <div class="card list-section">
     <h2>Lista de Devedores</h2>
     <div id="dividas-container" class="dividas-list"></div>
    </div>
   </div>
  </div>
  <script src="js/app.js"></script>
 </body>
</html>
